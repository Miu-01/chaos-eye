<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>光影拼图：混沌之眼</title>
<style type="text/css">
  body { margin:0; padding:0; background:#0a0a1a; color:#e0e0e0; font-family:Arial,Helvetica,sans-serif; text-align:center; -webkit-user-select:none; user-select:none; }
  h1 { font-size:18px; color:#7ef0ff; margin:10px 0 5px 0; }
  .subtitle { font-size:12px; color:#888; }
  .info { font-size:14px; margin:8px 0; }
  canvas#main { width:300px; height:300px; background:#111128; border:1px solid #333; display:block; margin:0 auto; position:relative; }
  .guide { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.85); padding:12px 20px; border-radius:8px; font-size:14px; color:#7ef0ff; z-index:10; animation:fadeOut 3s forwards; pointer-events:none; }
  @keyframes fadeOut { 0%{opacity:1;} 70%{opacity:1;} 100%{opacity:0; display:none;} }
  .options { width:320px; margin:15px auto; overflow:hidden; }
  .opt-canvas { width:90px; height:90px; background:#18183a; border:2px solid #444; float:left; margin:5px; transition:transform 0.1s; }
  .opt-canvas:active { transform:scale(0.95); }
  .opt-canvas.correct { border-color:#4f4; background:#1a3a1a; animation:correctFlash 0.3s; }
  .opt-canvas.wrong { border-color:#f44; background:#3a1a1a; animation:wrongShake 0.3s; }
  @keyframes correctFlash { 0%{box-shadow:0 0 0 rgba(79,255,79,0);} 50%{box-shadow:0 0 15px rgba(79,255,79,0.8);} 100%{box-shadow:0 0 0 rgba(79,255,79,0);} }
  @keyframes wrongShake { 0%{transform:translateX(0);} 25%{transform:translateX(-5px);} 50%{transform:translateX(5px);} 75%{transform:translateX(-5px);} 100%{transform:translateX(0);} }
  button { padding:10px 30px; background:#7ef0ff22; color:#7ef0ff; border:1px solid #7ef0ff55; font-size:16px; margin-top:10px; }
  .level-tag { display:inline-block; padding:2px 8px; font-size:12px; margin-left:5px; border-radius:4px; }
  .lv0 { background:#1a3a2a; color:#7fff7f; }
  .lv1 { background:#1a3a1a; color:#4f4; }
  .lv2 { background:#3a3a1a; color:#ff4; }
  #msg { font-size:14px; color:#aaa; height:20px; margin-top:5px; }
  .encourage { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:20px; border-radius:10px; font-size:16px; color:#7ef0ff; z-index:20; display:none; }
</style>
</head>
<body>
<h1>光影拼图：混沌之眼</h1>
<div class="subtitle">颜色是辅助线索，形状才是核心哦～</div>
<div class="info">
  关卡 <span id="levelNum">1</span>
  <span class="level-tag lv0" id="lvTag">Lv.0 新手教学</span>
</div>
<div style="position:relative; width:300px; margin:0 auto;">
  <canvas id="main" width="300" height="300"></canvas>
  <div class="guide" id="guide">👀 记住闪烁的颜色+形状特征！</div>
</div>
<div class="options" id="opts"></div>
<div id="msg"></div>
<button onclick="nextLevel()">下一关</button>
<div class="encourage" id="encourage"></div>

<script type="text/javascript">
var canvas = document.getElementById("main");
var ctx = canvas.getContext("2d");
var CENTER = {x:150, y:130};
var currentLevel = 0;
var state = "flash";
var optsData = [];
var guideShown = false;

// 🎯 核心调整1：预定义4种高辨识度特征+对应颜色（教学关用实色，后面逐渐变淡）
var FEATURE_CONFIG = [
  { type:0, name:"尖刺", color:"#ff4d4f", lightColor:"rgba(255,77,79,0.2)" }, // 红：尖刺
  { type:1, name:"凹槽", color:"#1890ff", lightColor:"rgba(24,144,255,0.2)" }, // 蓝：凹槽
  { type:2, name:"圆角", color:"#faad14", lightColor:"rgba(250,173,20,0.2)" }, // 黄：圆角
  { type:3, name:"凸起", color:"#52c41a", lightColor:"rgba(82,196,26,0.2)" }  // 绿：凸起
];

// 🎯 核心调整2：难度梯度（颜色饱和度随关卡降低）
var DIFFICULTY = [
  { 
    name:'Lv.0 新手教学', tagClass:'lv0', flash:2000, options:3, rotate:false, mirror:false,
    colorSaturation:1, // 100%饱和度，颜色非常明显
    desc:'无旋转/无镜像，颜色+形状双线索，先练手～'
  },
  { 
    name:'Lv.1 静止时光', tagClass:'lv1', flash:1500, options:4, rotate:false, mirror:false,
    colorSaturation:0.5, // 50%饱和度，颜色变淡
    desc:'无旋转，颜色变淡，主要靠形状哦～'
  },
  { 
    name:'Lv.2 流光溢彩', tagClass:'lv2', flash:1000, options:6, rotate:true, mirror:false,
    colorSaturation:0.1, // 10%饱和度，几乎无色差
    desc:'碎片会旋转，颜色几乎消失，纯考形状！'
  }
];

// 生成带特征和颜色的缺口
function createFeaturePiece(sides, radius, gapIdx, level, featureType) {
  var pts = [];
  for (var i=0; i<sides; i++) {
    var a = (Math.PI*2*i/sides) - Math.PI/2;
    pts.push({x:CENTER.x + radius*Math.cos(a), y:CENTER.y + radius*Math.sin(a)});
  }
  var p0 = pts[gapIdx];
  var p1 = pts[(gapIdx+1)%sides];
  var mid = {x:(p0.x+p1.x)/2, y:(p0.y+p1.y)/2};
  var config = FEATURE_CONFIG[featureType];
  
  // 根据特征类型生成形状
  var piece = [];
  switch(featureType) {
    case 0: // 尖刺（顶端明显凸起）
      var tip = {x:mid.x + (mid.x-CENTER.x)/radius*42, y:mid.y + (mid.y-CENTER.y)/radius*42};
      piece = [p0, tip, p1];
      break;
    case 1: // 凹槽（边缘明显凹陷）
      var inner = {x:mid.x + (mid.x-CENTER.x)/radius*20, y:mid.y + (mid.y-CENTER.y)/radius*20};
      piece = [p0, inner, p1];
      break;
    case 2: // 圆角（一角圆润）
      var tip = {x:mid.x + (mid.x-CENTER.x)/radius*32, y:mid.y + (mid.y-CENTER.y)/radius*32};
      piece = [p0, tip, p1];
      break;
    case 3: // 凸起（一侧小鼓包）
      var bump = {x:mid.x + (mid.x-CENTER.x)/radius*25, y:mid.y + (mid.y-CENTER.y)/radius*25};
      piece = [p0, bump, p1];
      break;
  }
  
  return {
    outline: pts,
    piece: piece,
    featureType: featureType,
    color: config.color,
    lightColor: config.lightColor,
    isRoundCorner: featureType === 2
  };
}

// 绘制带颜色的碎片
function drawPiece(targetCtx, pieceData, cx, cy, scaleX, scaleY, rotDeg, isFlash, saturation) {
  targetCtx.save();
  targetCtx.translate(cx, cy);
  targetCtx.rotate(rotDeg * Math.PI/180);
  targetCtx.scale(scaleX, scaleY);
  targetCtx.translate(-cx, -cy);
  
  // 应用颜色饱和度
  var color = pieceData.lightColor;
  if (saturation < 1) {
    // 降低饱和度：转为灰度再混合
    var r = parseInt(pieceData.lightColor.match(/\d+/g)[0]);
    var g = parseInt(pieceData.lightColor.match(/\d+/g)[1]);
    var b = parseInt(pieceData.lightColor.match(/\d+/g)[2]);
    var gray = 0.299*r + 0.587*g + 0.114*b;
    r = gray + (r - gray)*saturation;
    g = gray + (g - gray)*saturation;
    b = gray + (b - gray)*saturation;
    color = `rgba(${r},${g},${b},${parseFloat(pieceData.lightColor.match(/[\d.]+$/)[0])})`;
  }
  
  // 闪烁时用实色，平时用淡色
  targetCtx.fillStyle = isFlash ? pieceData.color : color;
  
  targetCtx.beginPath();
  var piece = pieceData.piece;
  targetCtx.moveTo(piece[0].x, piece[0].y);
  
  for (var i=1; i<piece.length; i++) {
    if (pieceData.isRoundCorner && i === 1) {
      // 圆角处理
      var prev = piece[i-1], curr = piece[i];
      var cpX = (prev.x + curr.x)/2, cpY = (prev.y + curr.y)/2;
      targetCtx.quadraticCurveTo(prev.x, prev.y, cpX, cpY);
    } else {
      targetCtx.lineTo(piece[i].x, piece[i].y);
    }
  }
  targetCtx.closePath();
  targetCtx.fill();
  targetCtx.restore();
}

// 生成关卡
function generateLevel(lv) {
  var diff = DIFFICULTY[Math.min(lv, DIFFICULTY.length-1)];
  document.getElementById("levelNum").innerHTML = lv+1;
  document.getElementById("lvTag").innerHTML = diff.name;
  document.getElementById("lvTag").className = "level-tag " + diff.tagClass;
  document.getElementById("msg").innerHTML = diff.desc;
  
  ctx.clearRect(0,0,canvas.width,canvas.height);
  state = "flash";
  
  // 教学关用4边形，后面逐渐增加复杂度
  var sides = lv === 0 ? 4 : 4 + Math.floor(Math.random()*2);
  var gapIdx = Math.floor(Math.random()*sides);
  // 教学关固定4种特征各来一遍，后面随机
  var featureType = lv === 0 ? lv % 4 : Math.floor(Math.random()*4);
  var puzzle = createFeaturePiece(sides, 70, gapIdx, lv, featureType);
  
  var answerRot = diff.rotate ? [0,90,180,270][Math.floor(Math.random()*4)] : 0;
  var answerMir = diff.mirror ? Math.random()>0.5 : false;
  
  // 画轮廓
  ctx.setLineDash([6,4]);
  ctx.strokeStyle = "#7ef0ff88";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(puzzle.outline[0].x, puzzle.outline[0].y);
  for (var i=1; i<puzzle.outline.length; i++) ctx.lineTo(puzzle.outline[i].x, puzzle.outline[i].y);
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);
  
  // 闪烁逻辑（带颜色）
  var flashCount = 0;
  var flashMax = diff.flash / 250 * 2;
  var flashInt = setInterval(function(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    // 重画轮廓
    ctx.setLineDash([6,4]);
    ctx.strokeStyle = "#7ef0ff88";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(puzzle.outline[0].x, puzzle.outline[0].y);
    for (var i=1; i<puzzle.outline.length; i++) ctx.lineTo(puzzle.outline[i].x, puzzle.outline[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);
    
    if (flashCount % 2 === 0) {
      // 闪烁时用实色，突出颜色线索
      drawPiece(ctx, puzzle, CENTER.x, CENTER.y, 1, 1, 0, true, diff.colorSaturation);
    }
    flashCount++;
    if (flashCount > flashMax) {
      clearInterval(flashInt);
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.setLineDash([6,4]);
      ctx.strokeStyle = "#7ef0ff88";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(puzzle.outline[0].x, puzzle.outline[0].y);
      for (var i=1; i<puzzle.outline.length; i++) ctx.lineTo(puzzle.outline[i].x, puzzle.outline[i].y);
      ctx.closePath();
      ctx.stroke();
      ctx.setLineDash([]);
      state = "choose";
      buildOptions(puzzle, diff, answerRot, answerMir, lv);
    }
  }, 250);
  
  // 显示引导
  if (!guideShown) {
    document.getElementById("guide").style.display = "block";
    setTimeout(function(){document.getElementById("guide").style.display = "none";}, 3000);
    guideShown = true;
  }
}

// 构建选项
function buildOptions(puzzle, diff, aRot, aMir, lv) {
  var optsEl = document.getElementById("opts");
  optsEl.innerHTML = "";
  optsData = [];
  var n = diff.options;
  
  // 正确答案
  optsData.push({piece:puzzle, rot:aRot, mir:aMir, isAnswer:true});
  
  // 生成干扰项（同颜色不同形状，或同形状不同颜色，避免纯靠颜色选）
  while (optsData.length < n) {
    var fakeRot = diff.rotate ? [0,90,180,270][Math.floor(Math.random()*4)] : 0;
    var fakeMir = diff.mirror ? Math.random()>0.5 : false;
    // 干扰项：30%概率同特征不同颜色，70%概率同颜色不同特征
    var fakeFeatureType = Math.random() < 0.3 ? puzzle.featureType : (puzzle.featureType + 1 + Math.floor(Math.random()*3)) % 4;
    var fakeSides = puzzle.outline.length;
    var fakeGapIdx = Math.floor(Math.random()*fakeSides);
    var fakePuzzle = createFeaturePiece(fakeSides, 70, fakeGapIdx, lv, fakeFeatureType);
    
    // 轻微变形，增加区分度
    var fp = JSON.parse(JSON.stringify(fakePuzzle.piece));
    var deformIdx = Math.floor(fp.length/2);
    fp[deformIdx].x += (Math.random()-0.5)*10;
    fp[deformIdx].y += (Math.random()-0.5)*10;
    
    optsData.splice(Math.floor(Math.random()*(optsData.length+1)), 0, {
      piece:{...fakePuzzle, piece:fp}, rot:fakeRot, mir:fakeMir, isAnswer:false
    });
  }
  
  // 渲染选项
  for (var i=0; i<optsData.length; i++) {
    var od = optsData[i];
    var c = document.createElement("canvas");
    c.className = "opt-canvas";
    c.width = 80; c.height = 80;
    c.setAttribute("data-index", i);
    
    var pc = c.getContext("2d");
    pc.fillStyle = "#18183a";
    pc.fillRect(0,0,80,80);
    
    var cx=40, cy=40, scale=0.55;
    var scaled = od.piece.piece.map(p=>({
      x:cx + (p.x-CENTER.x)*scale,
      y:cy + (p.y-CENTER.y)*scale
    }));
    
    // 绘制碎片（用当前关卡的饱和度）
    drawPiece(pc, {...od.piece, piece:scaled}, cx, cy, od.mir?-scale:scale, scale, od.rot, false, DIFFICULTY[Math.min(currentLevel, DIFFICULTY.length-1)].colorSaturation);
    pc.fill();
    
    c.onclick = function(){handleChoose(parseInt(this.getAttribute("data-index")));};
    c.ontouchstart = function(e){e.preventDefault(); handleChoose(parseInt(this.getAttribute("data-index")));};
    optsEl.appendChild(c);
  }
}

// 选择处理
function handleChoose(idx) {
  if (state !== "choose") return;
  state = "done";
  var items = document.querySelectorAll(".opt-canvas");
  var msg = document.getElementById("msg");
  var encourage = document.getElementById("encourage");
  
  for (var i=0; i<items.length; i++) {
    var item = items[i];
    var dataIdx = parseInt(item.getAttribute("data-index"));
    if (optsData[dataIdx].isAnswer) {
      item.className = "opt-canvas correct";
    } else if (dataIdx === idx) {
      item.className = "opt-canvas wrong";
    }
    item.onclick = null;
    item.ontouchstart = null;
  }
  
  if (optsData[idx].isAnswer) {
    msg.innerHTML = "✅ 正确！";
    msg.style.color = "#4f4";
    if (currentLevel === 0) {
      encourage.innerHTML = "🎉 眼力不错！<br>接下来颜色会变淡，要靠形状哦～";
      encourage.style.display = "block";
      setTimeout(function(){encourage.style.display="none";}, 2000);
    }
  } else {
    msg.innerHTML = "❌ 不对，再看看？";
    msg.style.color = "#f44";
  }
}

function nextLevel() {
  document.getElementById("msg").innerHTML = "";
  currentLevel++;
  generateLevel(currentLevel);
}

// 初始化
setTimeout(function(){generateLevel(0);}, 500);
</script>
</body>
</html>
