<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 强制全屏，禁止缩放，这是兼容性的基石 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>光影拼图：混沌之眼</title>
<style type="text/css">
  body {
    margin: 0;
    padding: 0;
    background: #0a0a1a;
    color: #e0e0e0;
    font-family: Arial, Helvetica, sans-serif; /* 只用最基础的字体 */
    text-align: center;
    -webkit-user-select: none; /* 禁止选中文字，防误触 */
    user-select: none;
  }
  h1 {
    font-size: 18px;
    color: #7ef0ff;
    margin: 10px 0 5px 0;
  }
  .subtitle { font-size: 12px; color: #888; }
  .info { font-size: 14px; margin: 8px 0; }
  /* 固定大小，不用自适应比例，老手机最爱 */
  canvas#main {
    width: 300px;
    height: 300px;
    background: #111128;
    border: 1px solid #333;
    display: block;
    margin: 0 auto;
  }
  .options {
    width: 320px;
    margin: 15px auto;
    overflow: hidden; /* 清除浮动 */
  }
  .opt-canvas {
    width: 90px;
    height: 90px;
    background: #18183a;
    border: 2px solid #444;
    float: left; /* 用 float 代替 flex，兼容性无敌 */
    margin: 5px;
  }
  .opt-canvas.correct { border-color: #4f4; background: #1a3a1a; }
  .opt-canvas.wrong { border-color: #f44; background: #3a1a1a; }
  button {
    padding: 10px 30px;
    background: #7ef0ff22;
    color: #7ef0ff;
    border: 1px solid #7ef0ff55;
    font-size: 16px;
    margin-top: 10px;
  }
  .level-tag {
    display: inline-block;
    padding: 2px 8px;
    font-size: 12px;
    margin-left: 5px;
  }
  .lv1 { background: #1a3a1a; color: #4f4; }
  .lv2 { background: #3a3a1a; color: #ff4; }
  #msg { font-size: 14px; color: #aaa; height: 20px; margin-top: 5px; }
</style>
</head>
<body>

<h1>光影拼图：混沌之眼</h1>
<div class="subtitle">记住闪烁的缺口 → 点选碎片</div>
<div class="info">
  关卡 <span id="levelNum">1</span>
  <span class="level-tag lv1" id="lvTag">Lv.1</span>
</div>
<canvas id="main" width="300" height="300"></canvas>
<div class="options" id="opts"></div>
<div id="msg"></div>
<button onclick="nextLevel()">下一关</button>

<script type="text/javascript">
// 全局变量
var canvas = document.getElementById("main");
var ctx = canvas.getContext("2d");
var CENTER = { x: 150, y: 130 };
var currentLevel = 0;
var state = "flash";
var optsData = [];

// 难度配置
var DIFFICULTY = [
  { name: 'Lv.1 静止时光', tagClass:'lv1', flash:1500, options:4, rotate:false, mirror:false },
  { name: 'Lv.2 流光溢彩', tagClass:'lv2', flash:1000, options:6, rotate:true,  mirror:false }
];

// 创建拼图（传统函数写法）
function createPuzzle(sides, radius, gapIdx) {
  var pts = [];
  for (var i = 0; i < sides; i++) {
    var a = (Math.PI * 2 * i / sides) - Math.PI / 2;
    pts.push({ x: CENTER.x + radius * Math.cos(a), y: CENTER.y + radius * Math.sin(a) });
  }
  var p0 = pts[gapIdx];
  var p1 = pts[(gapIdx + 1) % sides];
  var mx = (p0.x + p1.x) / 2;
  var my = (p0.y + p1.y) / 2;
  var tip = {
    x: mx + (mx - CENTER.x) / radius * 35,
    y: my + (my - CENTER.y) / radius * 35
  };
  return { outline: pts, piece: [p0, tip, p1] };
}

// 绘制碎片
function drawPiece(targetCtx, piecePts, cx, cy, scaleX, scaleY, rotDeg) {
  targetCtx.save();
  targetCtx.translate(cx, cy);
  targetCtx.rotate(rotDeg * Math.PI / 180);
  targetCtx.scale(scaleX, scaleY);
  targetCtx.translate(-cx, -cy);
  targetCtx.beginPath();
  targetCtx.moveTo(piecePts[0].x, piecePts[0].y);
  for (var i = 1; i < piecePts.length; i++) {
    targetCtx.lineTo(piecePts[i].x, piecePts[i].y);
  }
  targetCtx.closePath();
  targetCtx.restore();
}

// 生成关卡
function generateLevel(lv) {
  var diff = DIFFICULTY[Math.min(lv, DIFFICULTY.length - 1)];
  document.getElementById("levelNum").innerHTML = lv + 1;
  document.getElementById("lvTag").innerHTML = diff.name;
  document.getElementById("lvTag").className = "level-tag " + diff.tagClass;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  state = "flash";

  var sides = 4 + Math.floor(Math.random() * 3);
  var gapIdx = Math.floor(Math.random() * sides);
  var puzzle = createPuzzle(sides, 70, gapIdx);

  var answerRot = diff.rotate ? [0,90,180,270][Math.floor(Math.random()*4)] : 0;
  var answerMir = diff.mirror ? Math.random() > 0.5 : false;

  // 画轮廓
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = "#7ef0ff88";
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(puzzle.outline[0].x, puzzle.outline[0].y);
  for (var i = 1; i < puzzle.outline.length; i++) {
    ctx.lineTo(puzzle.outline[i].x, puzzle.outline[i].y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.setLineDash([]);

  // 闪烁逻辑
  var flashCount = 0;
  var flashMax = diff.flash / 250 * 2; // 计算闪烁次数
  var flashInt = setInterval(function() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    // 重画轮廓
    ctx.setLineDash([6, 4]);
    ctx.strokeStyle = "#7ef0ff88";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(puzzle.outline[0].x, puzzle.outline[0].y);
    for (var i = 1; i < puzzle.outline.length; i++) {
      ctx.lineTo(puzzle.outline[i].x, puzzle.outline[i].y);
    }
    ctx.closePath();
    ctx.stroke();
    ctx.setLineDash([]);

    if (flashCount % 2 == 0) {
      ctx.fillStyle = "#ffd57ecc";
      drawPiece(ctx, puzzle.piece, CENTER.x, CENTER.y, 1, 1, 0);
      ctx.fill();
    }
    flashCount++;
    if (flashCount > flashMax) {
      clearInterval(flashInt);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = "#7ef0ff88";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(puzzle.outline[0].x, puzzle.outline[0].y);
      for (var i = 1; i < puzzle.outline.length; i++) {
        ctx.lineTo(puzzle.outline[i].x, puzzle.outline[i].y);
      }
      ctx.closePath();
      ctx.stroke();
      ctx.setLineDash([]);
      state = "choose";
      buildOptions(puzzle, diff, answerRot, answerMir);
    }
  }, 250);
}

// 构建选项
function buildOptions(puzzle, diff, aRot, aMir) {
  var optsEl = document.getElementById("opts");
  optsEl.innerHTML = "";
  optsData = [];
  var n = diff.options;
  
  optsData.push({ piece: puzzle.piece, rot: aRot, mir: aMir, isAnswer: true });
  while (optsData.length < n) {
    var fakeRot = diff.rotate ? [0,90,180,270][Math.floor(Math.random()*4)] : 0;
    var fakeMir = diff.mirror ? Math.random() > 0.5 : false;
    var fp = JSON.parse(JSON.stringify(puzzle.piece));
    fp[1].x += (Math.random() - 0.5) * 10;
    fp[1].y += (Math.random() - 0.5) * 10;
    var insertPos = Math.floor(Math.random() * (optsData.length + 1));
    optsData.splice(insertPos, 0, { piece: fp, rot: fakeRot, mir: fakeMir, isAnswer: false });
  }

  for (var i = 0; i < optsData.length; i++) {
    var od = optsData[i];
    var c = document.createElement("canvas");
    c.className = "opt-canvas";
    c.width = 80;
    c.height = 80;
    c.setAttribute("data-index", i); // 用 attribute 存索引，比闭包兼容性好
    
    var pc = c.getContext("2d");
    pc.fillStyle = "#18183a";
    pc.fillRect(0, 0, 80, 80);
    
    var cx = 40, cy = 40, scale = 0.55;
    var scaled = [];
    for (var j = 0; j < od.piece.length; j++) {
      scaled.push({
        x: cx + (od.piece[j].x - CENTER.x) * scale,
        y: cy + (od.piece[j].y - CENTER.y) * scale
      });
    }
    
    pc.fillStyle = "#e0e0e0";
    drawPiece(pc, scaled, cx, cy, od.mir ? -scale : scale, scale, od.rot);
    pc.fill();

    // 兼容老设备的事件绑定
    c.onclick = function() { handleChoose(parseInt(this.getAttribute("data-index"))); };
    c.ontouchstart = function(e) { 
      e.preventDefault(); // 阻止触摸时页面的默认滚动
      handleChoose(parseInt(this.getAttribute("data-index"))); 
    };
    
    optsEl.appendChild(c);
  }
}

// 选择处理
function handleChoose(idx) {
  if (state !== "choose") return;
  state = "done";
  var items = document.querySelectorAll(".opt-canvas");
  var msg = document.getElementById("msg");
  
  for (var i = 0; i < items.length; i++) {
    var item = items[i];
    var dataIdx = parseInt(item.getAttribute("data-index"));
    if (optsData[dataIdx].isAnswer) {
      item.className = "opt-canvas correct";
    } else if (dataIdx === idx) {
      item.className = "opt-canvas wrong";
    }
    // 移除事件，防止重复点击
    item.onclick = null;
    item.ontouchstart = null;
  }

  if (optsData[idx].isAnswer) {
    msg.innerHTML = "✅ 正确！";
    msg.style.color = "#4f4";
  } else {
    msg.innerHTML = "❌ 不对，再看看？";
    msg.style.color = "#f44";
  }
}

function nextLevel() {
  document.getElementById("msg").innerHTML = "";
  currentLevel++;
  generateLevel(currentLevel);
}

// 启动
generateLevel(0);
</script>
</body>
</html>
